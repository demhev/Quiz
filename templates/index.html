{% extends "base.html" %}

{% block title %}Все викторины{% endblock %}
{% block content %}
    <h1>Выберите викторину</h1>
    <ul>
        {% for id, name in quizzes %}
            <li><a href="{{ url_for('quiz', quiz_id=id) }}">{{ name }}</a></li>
        {% endfor %}
    </ul>

    <!-- Новая форма -->
    <hr>
    <h3>Создать новую викторину</h3>
    <a href="{{ url_for('create_quiz') }}" class="btn btn-primary mt-3">➕ Создать новый опрос</a>
{% endblock %}
